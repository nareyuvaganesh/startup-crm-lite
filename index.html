<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>startup-crm-lite</title>
    <script>
      /*
       * Apply the saved theme before React and the stylesheet render.
       * This prevents a light-mode flash when a dark-mode session reloads.
       */
      try {
        if (JSON.parse(localStorage.getItem("startup-crm-theme") || "false")) {
          document.documentElement.classList.add("dark");
        }
      } catch {
        document.documentElement.classList.remove("dark");
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
